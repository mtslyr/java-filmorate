logging:
  level:
    org:
      zalando:
        logbook: trace

server:
  port: 8088

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator

spring:
  sql:
    init:
      mode: ALWAYS
  h2:
    console:
      enabled: true
      path: /h2
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
